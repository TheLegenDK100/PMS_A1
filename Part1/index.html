<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>Inventory Management</h1>
      <p>Manage stock, search items, and review popular products without server-side storage.</p>
    </header>

    <section class="panel form-panel">
      <h2>Item Details</h2>
      <div class="form-grid">
        <label for="itemId">Item ID</label>
        <input type="text" id="itemId" placeholder="Unique ID" />

        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Coffee Table" />

        <label for="itemCategory">Category</label>
        <select id="itemCategory">
          <option value="Electronics">Electronics</option>
          <option value="Furniture">Furniture</option>
          <option value="Clothing">Clothing</option>
          <option value="Tools">Tools</option>
          <option value="Miscellaneous">Miscellaneous</option>
        </select>

        <label for="itemQuantity">Quantity</label>
        <input type="number" id="itemQuantity" min="0" placeholder="0" />

        <label for="itemPrice">Price</label>
        <input type="number" id="itemPrice" min="0" step="0.01" placeholder="0.00" />

        <label for="itemSupplier">Supplier Name</label>
        <input type="text" id="itemSupplier" placeholder="Supplier name" />

        <label for="itemStock">Stock Status</label>
        <select id="itemStock">
          <option value="In Stock">In Stock</option>
          <option value="Low Stock">Low Stock</option>
          <option value="Out of Stock">Out of Stock</option>
        </select>

        <label for="itemPopular">Popular Item</label>
        <select id="itemPopular">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>

        <label for="itemComment">Comment</label>
        <textarea id="itemComment" rows="3" placeholder="Optional note"></textarea>
      </div>

      <div class="button-row">
        <button id="addButton" type="button">Add Item</button>
        <button id="updateButton" type="button">Update Item</button>
        <button id="deleteButton" type="button">Delete Item</button>
      </div>
    </section>

    <section class="panel search-panel">
      <h2>Search & Display</h2>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search by item name" />
        <button id="searchButton" type="button">Search</button>
      </div>
      <div class="display-row">
        <button id="showAllButton" type="button">Show All Items</button>
        <button id="showPopularButton" type="button">Show Popular Items</button>
      </div>
      <div id="messageBox" class="message"></div>
    </section>

    <section class="panel output-panel">
      <h2>Inventory Results</h2>
      <div id="results"></div>
    </section>
  </main>
  <script src="dist/app.js"></script>
</body>
</html>
